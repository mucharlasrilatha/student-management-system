<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

<style>
    
     nav{
        border: 100px;
        background-color: rgb(19, 18, 18);
        font-size:large;
        line-height:50px;
        
        height: 50px;
        text-align:center;
    }
nav a{
    
    color:white;
    margin-left: 60px;
    text-align: center;
    text-decoration: none;


}
nav a:hover{
    color:yellow;
}
form{
    border: 1px solid black;
    color:blue;
    text-align: center;
    width:600px;
    margin-left: 450px;
    background-color: rgb(133, 214, 244);
    margin-top: 20px;

}
label{
    display:block;
    font-weight: bold;
}
</style>
<script>
    window.onload=function(){
         const students=JSON.parse(localStorage.getItem("students") || "[]");
         const params=new URLSearchParams(window.location.search);
         const index=params.get("index");
    document.getElementById("Name").value=students[index].name;
    document.getElementById("Roll No").value=students[index].rollno;
    document.getElementById("Grade").value=students[index].grade;
    }
    function updatefun()
    {
        event.preventDefault();
         const students=JSON.parse(localStorage.getItem("students") || "[]");
         const params=new URLSearchParams(window.location.search);
         const index=params.get("index");
         students[index]={

           name:document.getElementById("Name").value,

           rollno: document.getElementById("Roll No").value,
           grade:document.getElementById("Grade").value
         };
         localStorage.setItem("students", JSON.stringify(students));
         window.location.href="view-students.html";

    }

</script>
</head>
<body>
     <nav>
        <a href="Dashboard.html">Dashboard</a>
    <a href="add-students.html">Add Students</a>
    <a href="view-students.html">View Students</a>
    <a href="logout.html">logout</a>
    </nav>
    <form onsubmit="updatefun()">
        <label for="Name">Name</label> 
        <input type="text" id="Name" ><br><br>
        <label for="Roll No">Roll No</label>
         <input type="text" id="Roll No" ><br><br>
        <label for="Grade">Grade</label>
        <input type="number" id="Grade"><br><br>
        <button type="submit">Update</button>
    </form>
    
</body>
</html>
