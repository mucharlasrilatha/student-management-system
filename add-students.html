<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

<style>
   
     nav{
        border: 100px;
        background-color: rgb(19, 18, 18);
        font-size:large;
        line-height:50px;
        
        height: 50px;
        text-align:center;
    }
nav a{
    
    color:white;
    margin-left: 60px;
    text-align: center;
    text-decoration: none;


}
nav a:hover{
    color:yellow;
}
    form{
        background-color: azure;
        color:blue;
        border: 1px solid black;
        width:400px;
        margin-left:550px;
        text-align: center;
        margin-top: 50px;
    }
    label{
        display: block;
        font-weight: bold;
    }
</style>
<script>
    function addstu(event)
    {
        event.preventDefault();
        const name=document.getElementById("Name").value;
        const rollno=document.getElementById("RollNo").value;
        const grade=document.getElementById("Grade").value;

   
        const students=JSON.parse(localStorage.getItem("students") || "[]");
       students.push({
    name: name,
    rollno: rollno,
    grade: grade
});
                localStorage.setItem("students",JSON.stringify(students));
                alert("students added successfully");
                window.location.href = "view-students.html";


    }
</script>
</head>
<body>
       <nav>
        <a href="Dashboard.html">Dashboard</a>
    <a href="add-students.html">Add Students</a>
    <a href="view-students.html">View Students</a>
    <a href="logout.html">logout</a>
    </nav>
    <form  onsubmit="addstu(event)" action="view-students.html">
        <label for="Name ">Name</label>
        <input type="text" id="Name" placeholder="Enter Student Name"><br><br>
        <label for="RollNo">Roll No</label>
         <input type="text" id="RollNo" placeholder="Enter Student roll no"><br><br>
       <label for="Grade">Grade</label>
       <input type="number" id="Grade" placeholder="Enter Student grade"><br><br>
        <button type="submit">Add Student</button>
    </form>
    
</body>
</html>
