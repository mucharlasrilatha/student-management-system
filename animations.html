<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
   @keyframes example
    {
        0%   {background-color:lightcoral;  transform:translate(300px,500px)}
        25%  {background-color:lightblue; transform:translate(800px,500px)}
        50%  {background-color:lightgreen; width:400px}
        75%  {background-color:lightpink; width:500px} 
        100% {background-color:lightcoral; width:800px; }
    }

    div
    {
        border:10px solid black;
       
        width:200px;
        height:40px;
        animation-name: example;
        animation-duration: 10s;
        animation-iteration-count: 3;
        
   
     


          }

</style>
<body>
    
        <div class="item"></div>
        
   
</body>
</html>
